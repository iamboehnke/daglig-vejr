# .github/workflows/deploy_pages.yml
#
# Deploys feedback.html to GitHub Pages with the fine-grained token
# injected at build time. The token is replaced in the deployed file
# but never stored in the main branch or git history.
#
# Triggers:
#   - On push to main when feedback.html changes
#   - Manually via workflow_dispatch

name: Deploy feedback page

on:
  push:
    branches: [main]
    paths:
      - feedback.html
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject token into feedback page
        run: |
          sed -i 's/FEEDBACK_TOKEN_PLACEHOLDER/${{ secrets.fine_grained_token }}/g' feedback.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          include_files: feedback.html
