# .github/workflows/parse_feedback.yml
#
# Triggered whenever a new GitHub Issue is opened with the 'feedback' label.
# These issues are created automatically when the user clicks the
# "Ja, det var praecist" or "Nej, passede ikke" links in the daily email.
#
# The workflow:
#   1. Runs feedback_job.py with issue details passed as environment variables.
#   2. feedback_job.py updates data/history.json and closes the issue.
#   3. The workflow commits the updated history.json.

name: Parse Feedback Issue

on:
  issues:
    types: [opened]

jobs:
  parse-feedback:
    name: Parse feedback and update history
    runs-on: ubuntu-latest

    # Only run if the issue has the 'feedback' label
    if: contains(github.event.issue.labels.*.name, 'feedback')

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run feedback parser
        env:
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:   ${{ github.repository }}
          ISSUE_NUMBER:  ${{ github.event.issue.number }}
          ISSUE_TITLE:   ${{ github.event.issue.title }}
          ISSUE_BODY:    ${{ github.event.issue.body }}
        run: python feedback_job.py

      - name: Commit updated history.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: feedback update from issue #${{ github.event.issue.number }}"
          file_pattern: "data/history.json"
          commit_user_name: "weather-advisory-bot"
          commit_user_email: "bot@users.noreply.github.com"
