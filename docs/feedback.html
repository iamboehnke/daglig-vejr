<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daglig Vejr -- Feedback</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f8fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: white;
      border: 1px solid #d0d7de;
      border-radius: 12px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 20px; margin-bottom: 10px; color: #24292f; }
    p  { font-size: 15px; color: #57606a; line-height: 1.5; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #d0d7de;
      border-top-color: #0969da;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner" id="spinner"></div>
  <h1 id="title">Registrerer feedback...</h1>
  <p id="msg">Et øjeblik.</p>
</div>

<script>
// ---------------------------------------------------------------------------
// Configuration -- update REPO and TOKEN after creating a fine-grained PAT
// ---------------------------------------------------------------------------
const REPO  = "iamboehnke/daglig-vejr";
const TOKEN = ""; // paste your fine-grained PAT here (issues:write only)
// ---------------------------------------------------------------------------

function show(icon, title, msg) {
  document.getElementById("spinner").style.display = "none";
  document.getElementById("card").insertAdjacentHTML(
    "afterbegin", `<div class="icon">${icon}</div>`
  );
  document.getElementById("title").textContent = title;
  document.getElementById("msg").textContent   = msg;
}

async function registerFeedback() {
  const params = new URLSearchParams(window.location.search);
  const date   = params.get("date");
  const result = params.get("result"); // "accurate" or "inaccurate"

  if (!date || !result) {
    show("", "Ugyldigt link", "Linket ser ud til at mangle information. Brug knapperne i emailen.");
    return;
  }

  if (!TOKEN) {
    show("", "Ikke konfigureret", "TOKEN mangler i feedback.html. Se README for opsætning.");
    return;
  }

  const label    = result === "accurate" ? "Accurate" : "Inaccurate";
  const emoji    = result === "accurate" ? "Ja, det var præcist" : "Nej, passede ikke";
  const issueTitle = `Feedback:${label}-${date}`;
  const issueBody  = `Date: ${date}\nAccurate: ${result === "accurate" ? "yes" : "no"}\n\nRegistreret via feedback-side.`;

  try {
    const response = await fetch(`https://api.github.com/repos/${REPO}/issues`, {
      method: "POST",
      headers: {
        "Authorization": `token ${TOKEN}`,
        "Accept":        "application/vnd.github.v3+json",
        "Content-Type":  "application/json",
      },
      body: JSON.stringify({ title: issueTitle, body: issueBody }),
    });

    if (response.ok) {
      const icon = result === "accurate" ? "" : "";
      show(icon, "Feedback registreret. Tak!", `Du svarede: "${emoji}" for ${date}.`);
    } else {
      const err = await response.json();
      show("", "Noget gik galt", `GitHub API svarede: ${err.message || response.status}`);
    }
  } catch (e) {
    show("", "Netværksfejl", "Kunne ikke oprette forbindelse. Prøv igen om lidt.");
  }
}

registerFeedback();
</script>
</body>
</html>
